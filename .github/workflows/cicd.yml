name: CI/CD - Build and Push to ECR

# release, pre-release 브랜치에 푸시될 때 워크플로우 실행
on:
  push:
    branches:
      - release
      - pre-release

# 워크플로우에 필요한 권한 설정
permissions:
  contents: read      # 리포지토리 코드를 checkout 하기 위함
  id-token: write     # AWS OIDC 인증을 위함

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 참고: Dockerfile에서 multi-stage build로 Gradle 빌드를 수행하므로
      # GitHub Actions에서 별도로 빌드할 필요 없음

      # 2. AWS 자격 증명 설정 (OIDC 사용)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3. Amazon ECR 로그인
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. 이미지 태그 생성 (Git SHA 사용)
      - name: Generate Image Tag
        id: image-tag
        run: echo "tag=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

      # 5. ECR 이미지 URI 정의
      - name: Define ECR Image URI
        id: ecr-image
        run: |
          registry=${{ steps.login-ecr.outputs.registry }}
          repo=${{ secrets.ECR_REPOSITORY }}
          tag=${{ steps.image-tag.outputs.tag }}
          echo "uri=${registry}/${repo}:${tag}" >> $GITHUB_OUTPUT

      # 6. Docker 이미지 빌드 및 ECR 푸시
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.ecr-image.outputs.uri }}

      # ==================================
      # 7. Manifest 리포지토리 업데이트
      # ==================================

      # 7-1. Manifest 리포지토리 체크아웃 (별도 경로에)
      - name: Checkout Manifest Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MANIFEST_REPO }}
          token: ${{ secrets.MANIFEST_REPO_PAT }}
          path: 'manifest-repo' # 충돌 방지를 위해 하위 디렉토리에 체크아웃

      # 7-2. Manifest 파일의 이미지 태그 업데이트 (yq 사용)
      - name: Update Manifest File (using yq)
        run: |
          # yq 설치
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

          MANIFEST_FILE_PATH="manifest-repo/${{ secrets.MANIFEST_FILE_PATH }}"
          NEW_TAG="${{ steps.image-tag.outputs.tag }}" # 예: 039b947

          echo "Updating $MANIFEST_FILE_PATH with new tag: $NEW_TAG"

          # values.yaml의 image.tag를 직접 업데이트
          yq -i '.image.tag = "'${NEW_TAG}'"' ${MANIFEST_FILE_PATH}

          echo "Manifest file updated:"
          cat ${MANIFEST_FILE_PATH}

      # 7-3. 변경 사항 커밋 및 푸시
      - name: Commit and Push to Manifest Repo
        run: |
          cd manifest-repo
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'github-actions-bot@users.noreply.github.com'
          git add .

          # 커밋할 변경 사항이 있는지 확인
          if git diff-index --quiet HEAD; then
            echo "No changes to commit."
          else
            git commit -m "Update user-service image to ${{ steps.image-tag.outputs.tag }}"
            git push
            echo "Changes pushed to manifest repo."
          fi
